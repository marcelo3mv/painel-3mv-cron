name: Atualizar Painel 3MV (Painel + 3MV Mobile)

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 09:00 BRT
    - cron: '0 16 * * 1-5'   # 13:00 BRT
    - cron: '0 20 * * 1-5'   # 17:00 BRT
    - cron: '0 1 * * 2-6'    # 22:00 BRT do dia anterior
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Etapa 0 — Criar credenciais.json a partir dos secrets
        env:
          SUAS_VENDAS_TOKEN: ${{ secrets.SUAS_VENDAS_TOKEN }}
        run: |
          mkdir -p "$HOME/Library/CloudStorage/GoogleDrive-marcelo@3mvrepresentacao.com/Meu Drive/3MV/Automações/comissoes"
          cat > "$HOME/Library/CloudStorage/GoogleDrive-marcelo@3mvrepresentacao.com/Meu Drive/3MV/Automações/comissoes/credenciais.json" <<EOF
          {
            "_comentario": "Gerado automaticamente pelo GitHub Actions a partir do secret SUAS_VENDAS_TOKEN",
            "subdominio": "representacao3mv.suasvendas.com",
            "cliente": "representacao3mv",
            "authorization": "$SUAS_VENDAS_TOKEN"
          }
          EOF
          echo "✓ Credenciais criadas"

      - name: Etapa 0b — Baixar planilhas do Drive (Service Account, opcional)
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          DRIVE_ID_CRM: ${{ secrets.DRIVE_ID_CRM }}
          DRIVE_ID_CC: ${{ secrets.DRIVE_ID_CC }}
          DRIVE_ID_METAS: ${{ secrets.DRIVE_ID_METAS }}
          DRIVE_ID_HIST: ${{ secrets.DRIVE_ID_HIST }}
        run: python -u scripts/baixar_planilhas_drive.py
        continue-on-error: true

      - name: Etapa 1 — Extrair saldos da API Suas Vendas
        run: |
          mkdir -p outputs
          python scripts/extrair_saldos.py \
            --config config.json \
            --output-json outputs/dados.json \
            --output-xlsx outputs/saldos.xlsx \
            --ano 2026

      - name: Etapa 2 — Copiar dados.json para Resources/
        run: cp outputs/dados.json dados.json

      - name: Etapa 3 — Injetar Conta Corrente + NFD (planilhas snapshot)
        run: python injetar_conta_corrente.py
        continue-on-error: true

      - name: Etapa 4 — Injetar Histórico
        run: python injetar_historico.py
        continue-on-error: true

      - name: Etapa 4b — Injetar Metas
        run: python injetar_metas.py
        continue-on-error: true

      - name: Etapa 4c — Injetar CRM
        run: python injetar_crm.py
        continue-on-error: true

      - name: Etapa 4d — Injetar Histórico de Pedidos 24/25/26
        run: python injetar_historico_pedidos.py
        continue-on-error: true

      - name: Etapa 4e — Injetar Field (opcional — atas/visitas/tarefas do Painel Mobile)
        env:
          FIELD_API_URL: ${{ secrets.FIELD_API_URL }}
          FIELD_API_TOKEN: ${{ secrets.FIELD_API_TOKEN }}
        run: python injetar_field.py
        continue-on-error: true

      - name: Etapa 4f — Injetar Agenda Google Calendar (opcional)
        env:
          GOOGLE_CALENDAR_ICAL_URL: ${{ secrets.GOOGLE_CALENDAR_ICAL_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python injetar_agenda.py
        continue-on-error: true

      - name: Etapa 5 — Gerar painel HTML
        run: python gerar_painel.py

      - name: Preparar diretório de deploy Cloudflare
        run: |
          mkdir -p cf-deploy

          # Painel principal
          cp painel_atual.html cf-deploy/index.html
          cp dados.json         cf-deploy/dados.json

          # 3MV Mobile (versão de domingo 10/05 - completa com Google Sign-In + Calendar client-side)
          [ -f 3mv-mobile.html ]      && cp 3mv-mobile.html      cf-deploy/3mv-mobile.html
          [ -f manifest-mobile.json ] && cp manifest-mobile.json cf-deploy/manifest-mobile.json

          # Painel Mobile alternativo (simplificado)
          [ -f painel-mobile.html ] && cp painel-mobile.html cf-deploy/painel-mobile.html
          [ -f manifest.json ]      && cp manifest.json      cf-deploy/manifest.json
          [ -f sw.js ]              && cp sw.js              cf-deploy/sw.js

          # Ícones mobile
          for f in mobile-icon-32.png mobile-icon-48.png mobile-icon-96.png mobile-icon-128.png mobile-icon-192.png mobile-icon-512.png mobile-banner-220x140.png; do
            [ -f "$f" ] && cp "$f" cf-deploy/
          done

          # Logos / ícones gerais
          for f in logo_3mv.png logo_3mv_branca.png logo_3mv_quadrado.png icon-192.png icon-512.png; do
            [ -f "$f" ] && cp "$f" cf-deploy/
          done

          # Páginas extras
          [ -f 404.html ]         && cp 404.html         cf-deploy/
          [ -f privacidade.html ] && cp privacidade.html cf-deploy/
          [ -f suporte.html ]     && cp suporte.html     cf-deploy/
          [ -f _headers ]         && cp _headers         cf-deploy/
          [ -f robots.txt ]       && cp robots.txt       cf-deploy/

          echo "Arquivos no cf-deploy:"
          ls -la cf-deploy/

      - name: Setup Node 22 (wrangler precisa)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Cloudflare Workers (assets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cat > cf-deploy/wrangler.toml <<EOF
          name = "painel-3mv"
          compatibility_date = "2024-01-01"
          [assets]
          directory = "./"
          EOF
          cd cf-deploy
          npx wrangler@latest deploy

      - name: Copiar painel_atual.html para index.html (GitHub Pages serve da raiz)
        run: |
          cp painel_atual.html index.html
          echo "✓ index.html atualizado ($(wc -c < index.html) bytes)"

      - name: Commitar TODOS os arquivos publicáveis (GitHub Pages serve do branch main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Painel principal
          git add dados.json painel_atual.html index.html 2>/dev/null || true
          # 3MV Mobile + Painel Mobile + manifests + sw
          git add 3mv-mobile.html painel-mobile.html manifest.json manifest-mobile.json sw.js 2>/dev/null || true
          # Logos e ícones
          git add logo_3mv.png logo_3mv_branca.png logo_3mv_quadrado.png logo_3mv_completa.png icon-192.png icon-512.png 2>/dev/null || true
          git add mobile-icon-32.png mobile-icon-48.png mobile-icon-96.png mobile-icon-128.png mobile-icon-192.png mobile-icon-512.png mobile-banner-220x140.png 2>/dev/null || true
          # Páginas extras
          git add 404.html privacidade.html suporte.html _headers robots.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: pipeline $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
        continue-on-error: true
